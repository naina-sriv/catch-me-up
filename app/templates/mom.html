<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting Copilot - Live Summary</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f8fafc;
            margin: 0;
            padding: 2rem;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        h1 {
            text-align: center;
            color: #38bdf8;
            margin-bottom: 2rem;
            font-weight: 600;
        }

        .timeline {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            background: rgba(0, 0, 0, 0.2);
            padding: 1rem;
            border-radius: 8px;
            border-left: 4px solid #38bdf8;
            transition: transform 0.2s ease;
        }

        .message:hover {
            transform: translateX(5px);
            background: rgba(255, 255, 255, 0.05);
        }

        .time {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 0.25rem;
        }

        .speaker {
            font-weight: 600;
            color: #cbd5e1;
            margin-right: 0.5rem;
        }

        .text {
            color: #f1f5f9;
            line-height: 1.5;
        }

        .empty {
            text-align: center;
            color: #94a3b8;
            font-style: italic;
            padding: 3rem;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🎙️ Live Meeting: {{ meeting_id }}</h1>
        <div class="timeline">
            {% if timeline %}
            {% for entry in timeline %}
            <div class="message">
                <div class="time">{{ entry.time }}</div>
                <div>
                    <span class="speaker">{{ entry.speaker }}:</span>
                    <span class="text">{{ entry.text }}</span>
                </div>
            </div>
            {% endfor %}
            {% else %}
            <div class="empty">Waiting for transcript data to arrive...</div>
            {% endif %}
        </div>
    </div>
    <script>
        setTimeout(function () {
            window.location.reload();
        }, 5000);
    </script>
</body>

</html>
