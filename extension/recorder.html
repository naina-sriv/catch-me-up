<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Catch-Me-Up Recorder</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 320px;
            height: 90px;
        }
        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ef4444;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }
        .info {
            font-size: 11px;
            color: #64748b;
            margin-top: 6px;
        }
    </style>
</head>
<body>
    <div class="status">
        <div class="dot" id="dot"></div>
        <span id="status-text">Connecting...</span>
    </div>
    <div class="info" id="info-text">Catch-Me-Up is streaming audio</div>
    <script src="recorder.js"></script>
</body>
</html>
